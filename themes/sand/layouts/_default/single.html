{{ define "main" }}
<article>
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ .Date.Format "2 January 2006" }}
      {{ with .Params.tags }}
        <span class="sep">·</span>
        {{ range . }}<span class="tag">{{ . }}</span> {{ end }}
      {{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
