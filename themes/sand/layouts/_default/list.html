{{ define "main" }}
<ul class="post-list">
  {{ range (where .Site.RegularPages "Type" "posts").ByDate.Reverse }}
  <li class="post-item">
    <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
    <div>
      <a class="post-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      </div>
      {{ end }}
    </div>
  </li>
  {{ end }}
</ul>
{{ end }}
